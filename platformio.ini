; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32@~6.4.0
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
	WiFiClientSecure
	blynkkk/Blynk@^1.3.2
	madhephaestus/ESP32Servo@^3.0.9
	mobizt/Firebase Arduino Client Library for ESP8266 and ESP32@^4.4.14
build_flags = 
	-D SERIAL_BAUD_DEFAULT=115200
	; ── Firebase / WiFi credentials ────────────────────────────────────────
	; Override these in a local platformio.ini or via environment variables.
	; NEVER commit real credentials to source control.
	-D WIFI_SSID=\"YourWiFiSSID\"
	-D WIFI_PASS=\"YourWiFiPassword\"
	-D FIREBASE_HOST=\"https://your-project-default-rtdb.firebaseio.com/\"
	-D FIREBASE_KEY=\"your_database_secret_or_legacy_token\"
